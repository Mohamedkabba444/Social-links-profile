<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <picture>
      <img src="assets/images/avatar-jessica.jpeg" alt="">
    </picture>
    <div class="profile">
      <h1>Jessica Randall</h1>
      <h2>London, United Kingdom</h2>
    </div>
    <h3>"Front-end developer and avid reader."</h3>
    <div class="buttons">
      <button class="gitHub-btn">GitHub</button>
      <button class="frontend_mentor-btn">Frontend Mentor</button>
      <button class="linkedin-btn">LinkedIn</button>
      <button class="twitter-btn">Twitter</button>
      <button class="instagram-btn">Instagram</button>
    </div>
  </div>
</body>

</html>
